<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Portafolio profesional de Luisa Fernanda Sánchez - Detalle de Proyecto">
    <meta name="author" content="Luisa Fernanda Sánchez">

    <title>Detalle del Proyecto</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;400;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="css/style.css" rel="stylesheet">
    <link rel="icon" href="images/favicon.png" type="image/png">
</head>

<body data-theme="dark">
    <!-- Navbar inyectado por JS -->
    <nav class="navbar navbar-expand-lg fixed-top" id="detailNavbar"></nav>

    <!-- HERO -->
    <section class="project-hero-section">
        <div class="container">
            <div class="row">
                <div class="col-12 text-center">
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb justify-content-center">
                            <li class="breadcrumb-item"><a href="index.html">Inicio</a></li>
                            <li class="breadcrumb-item"><a href="index.html#projects">Proyectos</a></li>
                            <li class="breadcrumb-item active" id="projectBreadcrumb">Proyecto</li>
                        </ol>
                    </nav>
                    <h1 class="project-detail-title mb-3" id="projectTitle"></h1>
                    <p class="project-detail-subtitle" id="projectSubtitle"></p>
                    <div class="project-meta-info mt-4" id="projectMeta"></div>
                    <div class="project-links-buttons mt-4" id="projectLinksButtons"></div>
                    <div class="project-links-demo mt-3" id="projectLinksDemo"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- GALERÍA -->
    <section class="project-gallery-section section-padding">
        <div class="container">
            <div class="row">
                <div class="col-12">
                    <div class="project-main-image mb-4">
                        <img id="projectMainImage" src="" class="img-fluid rounded shadow-lg" alt="proyecto principal">
                    </div>
                </div>
            </div>
            <div class="row mt-4" id="projectGallery"></div>
        </div>
    </section>

    <!-- DETALLE -->
    <section class="project-details-section section-padding section-bg">
        <div class="container">
            <div class="row">
                <div class="col-lg-8 col-12 mb-5 mb-lg-0">
                    <h2 class="mb-4">Descripción del Proyecto</h2>
                    <div class="project-description" id="projectDescription"></div>
                </div>
                <div class="col-lg-4 col-12">
                    <div class="project-info-box mb-4">
                        <h4 class="mb-3"><i class="bi bi-code-slash me-2"></i>Tecnologías Utilizadas</h4>
                        <div class="tech-stack-list" id="projectTech"></div>
                    </div>
                    <div class="project-info-box mb-4">
                        <h4 class="mb-3"><i class="bi bi-tools me-2"></i>Herramientas</h4>
                        <div class="tech-stack-list" id="projectTools"></div>
                    </div>
                    <div class="project-info-box mb-4 d-none" id="projectStatsBox">
                        <h4 class="mb-3"><i class="bi bi-graph-up me-2"></i>Estadísticas</h4>
                        <ul class="project-stats-list" id="projectStats"></ul>
                    </div>
                    <div class="project-info-box d-none" id="projectExtraLinksBox">
                        <h4 class="mb-3"><i class="bi bi-link-45deg me-2"></i>Enlaces</h4>
                        <div class="d-grid gap-2" id="projectExtraLinks"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- EQUIPO -->
    <section class="project-team-section section-padding" id="projectTeamSection">
        <div class="container">
            <div class="row">
                <div class="col-12 text-center mb-5">
                    <h2 class="mb-3">Equipo</h2>
                    <p class="section-description" id="teamDescription"></p>
                </div>
            </div>
            <div class="row justify-content-center" id="projectTeam"></div>
        </div>
    </section>

    <!-- Footer inyectado por JS -->
    <footer class="site-footer" id="siteFooter"></footer>

    <button id="scrollTopBtn" class="scroll-top-btn" aria-label="Volver arriba">
        <i class="bi bi-arrow-up"></i>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
    <script src="js/portfolio-data.js"></script>
    <script src="js/github-api.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
